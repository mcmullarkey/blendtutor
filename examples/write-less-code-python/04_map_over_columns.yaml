checks:
  - "assert normalize_columns(pd.DataFrame({'a': [0, 10]}), ['a'])['a'].tolist() == [0.0, 1.0]"
  - "assert normalize_columns(pd.DataFrame({'a': [0, 10], 'b': [0, 5]}), ['a', 'b'])['b'].tolist() == [0.0, 1.0]"
  - "assert normalize_columns(pd.DataFrame({'a': [5, 5]}), ['a'])['a'].tolist() == [0.0, 0.0]"

