  - submission: |-
      import pandas as pd
      survey_data = pd.DataFrame({
          'respondent_id': [1, 2, 3, 4, 5],
          'stress_1': [3, 4, 2, 5, 3],
          'stress_2': [2, 3, 4, 3, 2],
          'stress_3': [4, 5, 3, 4, 3],
          'stress_4': [3, 2, 4, 5, 4],
          'stress_5': [2, 3, 5, 4, 3],
          'stress_6': [4, 3, 2, 3, 5],
      })
    expected: correct
  # Correct: different values but same structure
  - submission: |-
      import pandas as pd
      survey_data = pd.DataFrame({
          'respondent_id': [10, 20, 30, 40, 50],
          'stress_1': [1, 2, 3, 4, 5],
          'stress_2': [5, 4, 3, 2, 1],
          'stress_3': [2, 3, 4, 5, 1],
          'stress_4': [3, 1, 5, 2, 4],
          'stress_5': [4, 5, 1, 3, 2],
          'stress_6': [1, 2, 3, 4, 5],
      })
    expected: correct
  # Near-miss: valid Python, runs cleanly, but missing stress_6 column
  - submission: |-
      import pandas as pd
      survey_data = pd.DataFrame({
          'respondent_id': [1, 2, 3, 4, 5],
          'stress_1': [3, 4, 2, 5, 3],
          'stress_2': [2, 3, 4, 3, 2],
          'stress_3': [4, 5, 3, 4, 3],
      })
    expected: incorrect
  # Incorrect: wrong number of rows
  - submission: |-
      import pandas as pd
      survey_data = pd.DataFrame({
          'respondent_id': [1, 2, 3],
          'stress_6': [4, 3, 2],
      })
    expected: incorrect
