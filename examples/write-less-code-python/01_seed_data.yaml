lesson_name: "Seed Data"
language: Python
description: "Create a pandas DataFrame with survey data including stress columns"
textbook_reference: "Just Enough Software Engineering - Chapter 8: Write Less Code, Part II"

exercise:
  type: "function_writing"
  prompt: |
    Create a pandas DataFrame `survey_data` with 5 respondents, a
    `respondent_id` column, and `stress_1` through `stress_6` (integers 1-5).

    The submission is correct if ALL of these are true:
    - Creates a variable named `survey_data`
    - It is a pandas DataFrame
    - It has exactly 5 rows
    - It has a `respondent_id` column
    - It has `stress_1` through `stress_6` columns (all six)
    - Stress columns contain integer values

    The submission is incorrect if ANY of these are true:
    - Missing any of stress_1 through stress_6
    - Wrong number of rows (not 5)
    - Missing respondent_id column
    - Has a syntax error
  hints: |
    Common mistake: forgetting a column or misspelling it. You need all six
    stress columns (stress_1 through stress_6) plus respondent_id — 7 columns
    total. Watch out for passing lists of unequal length to the DataFrame
    constructor; pandas raises a ValueError. Tip: verify with
    `survey_data.shape` which should print (5, 7). Remember that integer
    values like [3, 4, 2, 5, 3] are stored as int64 automatically — no
    explicit dtype needed.
  code_template: |
    import pandas as pd

    # Create survey_data with 5 respondents and stress_1 through stress_6
  solution: |
    import pandas as pd

    survey_data = pd.DataFrame({
        'respondent_id': [1, 2, 3, 4, 5],
        'stress_1': [3, 4, 2, 5, 3],
        'stress_2': [2, 3, 4, 3, 2],
        'stress_3': [4, 5, 3, 4, 3],
        'stress_4': [3, 2, 4, 5, 4],
        'stress_5': [2, 3, 5, 4, 3],
        'stress_6': [4, 3, 2, 3, 5],
    })
  example_usage: |
    print(survey_data.shape)  # (5, 7)
    print(list(survey_data.columns))  # ['respondent_id', 'stress_1', ..., 'stress_6']
  success_criteria: |
    - DataFrame has 5 rows and 7 columns
    - Contains a `stress_6` column
    - All stress columns contain integers
  llm_evaluation_prompt: |
    You are evaluating student code for a software engineering course.

    Exercise: Create a pandas DataFrame called `survey_data` with 5 respondents
    and columns `respondent_id`, `stress_1` through `stress_6`. Each stress
    column should contain integer values between 1 and 5.

    A submission is correct if ALL of these are true:
    1. Creates a variable named `survey_data`
    2. It is a pandas DataFrame
    3. It has exactly 5 rows
    4. It has a `respondent_id` column
    5. It has `stress_1` through `stress_6` columns (all six)
    6. Stress columns contain integer values

    A submission is incorrect if ANY of these are true:
    1. Missing any of stress_1 through stress_6
    2. Wrong number of rows (not 5)
    3. Missing respondent_id column
    4. Has a syntax error

    Student submitted this code:
    {student_code}

    Evaluate the code and call the respond_with_feedback function with your assessment.
    Set is_correct to true if the code meets all requirements, false otherwise.
    Provide brief, encouraging feedback (2-3 sentences) in feedback_message.

checks:
  - "assert len(survey_data) == 5"
  - "assert 'stress_6' in survey_data.columns"
  - "assert survey_data['stress_6'].sum() == 17"

packages:
  - pandas
