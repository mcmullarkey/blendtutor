name: CI

on:
  push:
    branches: [main, "staging/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · nextest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # rust-toolchain.toml pins the channel and the rustfmt/clippy components;
      # rustup installs them on first cargo use, so the file is the single source
      # of truth for the toolchain. This step just surfaces it (and fails loudly
      # if the pinned toolchain cannot be installed).
      - name: Install pinned toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      # A failing test must fail the job: nextest propagates a red test as a
      # nonzero exit (no `--no-run`, no `continue-on-error`, no `|| true`).
      - name: Test
        run: cargo nextest run --locked

      # Issue #71 — the Fireworks default model id is a dual-consumer field
      # (Rust CLI + JS BYOK). This asserts both sides agree on the same id and
      # that the retired `qwen3-vl-30b-a3b-instruct` leaves no dead-code ghost.
      # Uses grep (not rg) so ubuntu-latest needs no extra install.
      - name: Model alignment
        run: ./scripts/check-model-alignment.sh

  quarto-render:
    name: quarto render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Quarto extension render test
        run: bash scripts/tests/test_quarto_render.sh

      # Issue #107 — Lua filter parses .blendtutor divs into widget HTML with
      # embedded 9-key SiteLesson JSON. Runs the filter test harness which
      # renders fixtures to HTML/latex and asserts the JSON contract.
      - name: Quarto filter test
        run: bash scripts/tests/test_quarto_filter.sh

      # Issue #111 — Pyodide shared-boot adapter with lazy boot and per-run
      # fresh globals. Validates adapter protocol, CDN injection, 3-state boot,
      # per-run globals, error surface, PyProxy cleanup, and coexistence.
      - name: Pyodide adapter test
        run: bash scripts/tests/test_pyodide_adapter.sh

      # Issue #112 — Per-exercise BYOK LLM feedback with shared key and
      # per-exercise scoping. Validates pure layer (buildPrompt, neutralize,
      # providerBaseUrl), shared sessionStorage key contract, per-exercise
      # scoping, ?provider= override, concurrent guard, and llm_evaluation_prompt
      # absence. Runs Node.js behavioral tests + source-pattern checks.
      - name: Exercise feedback test
        run: python3 scripts/tests/test_quarto_feedback.py

      # Issue #114 — Opt-in cross-origin isolation via coi="true" filter
      # attribute. Validates 7-clause predicate: coi="true" activates,
      # false/yes/empty rejected, dedup, byte-parity, per-page isolation,
      # no R exercises still registers, coi-yaml activates.
      - name: COI filter test
        run: bash scripts/tests/test_coi_filter.sh

  asset-parity:
    name: asset parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sync assets
        run: bash scripts/sync-quarto-assets.sh

      - name: Check no drift (git diff --exit-code)
        run: git diff --exit-code

      - name: Asset scoping verification
        run: python3 scripts/tests/verify_asset_scoping.py

      - name: Asset sync integration test
        run: bash scripts/tests/test_sync_assets.sh
