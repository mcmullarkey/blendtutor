<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AC-4 Runtime Edge Cases Test Fixture</title>
  <link rel="stylesheet" href="../../_extensions/blendtutor/assets/styles.css">
</head>
<body>
  <!--
    AC-4 runtime edge-case fixture: malformed JSON, duplicate IDs, CM6 failure.
    Tests isolation: one bad exercise must not break the others.
  -->

  <h1>AC-4 Multi-Exercise Runtime Edge Cases</h1>

  <!-- Exercise 1: Valid R exercise (should mount normally) -->
  <div class="bt-exercise" data-language="r">
    <script type="application/json">{
      "id": "bt-edge-0",
      "title": "Valid R Exercise",
      "prompt": "Write a function.",
      "code_template": "f <- function(x) { x }",
      "checks": ["stopifnot(f(1) == 1)"],
      "packages": [],
      "solution": null,
      "hints": null,
      "gotchas": null
    }</script>
  </div>

  <!-- Exercise 2: Malformed JSON (should be skipped with warning) -->
  <div class="bt-exercise" data-language="python">
    <script type="application/json">{ this is not valid json !!! }</script>
  </div>

  <!-- Exercise 3: Duplicate ID (should be skipped with warning) -->
  <div class="bt-exercise" data-language="r">
    <script type="application/json">{
      "id": "bt-edge-0",
      "title": "Duplicate ID Exercise",
      "prompt": "This has a duplicate ID.",
      "code_template": "duplicate <- 1",
      "checks": [],
      "packages": [],
      "solution": null,
      "hints": null,
      "gotchas": null
    }</script>
  </div>

  <!-- Exercise 4: CM6 failure simulation (should fall back to textarea) -->
  <div class="bt-exercise" data-language="r" data-cm-fail="true">
    <script type="application/json">{
      "id": "bt-edge-1",
      "title": "CM6 Failure Exercise",
      "prompt": "This exercise simulates CM6 failure.",
      "code_template": "code <- 42",
      "checks": [],
      "packages": [],
      "solution": null,
      "hints": null,
      "gotchas": null
    }</script>
  </div>

  <!-- Exercise 5: Valid Python exercise (should mount normally) -->
  <div class="bt-exercise" data-language="python">
    <script type="application/json">{
      "id": "bt-edge-2",
      "title": "Valid Python Exercise",
      "prompt": "Print hello.",
      "code_template": "print('hello')",
      "checks": [],
      "packages": [],
      "solution": null,
      "hints": null,
      "gotchas": null
    }</script>
  </div>

  <script type="module">
    import { scanExercises, buildRegistry, start } from "../../_extensions/blendtutor/assets/exercise-runtime.js";
    import { createMockAdapter } from "./mock-adapter.js";

    const mockAdapter = createMockAdapter();
    const registry = buildRegistry(scanExercises());
    window.__btTestAdapter = mockAdapter;
    start(registry, mockAdapter);
  </script>
</body>
</html>
