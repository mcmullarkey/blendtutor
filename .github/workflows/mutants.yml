name: Mutation testing

# cargo-mutants is slow, so it must never sit on the per-PR critical path. It
# runs on a weekly schedule, on manual dispatch, and on demand for a single PR
# by adding the `mutation` label. The gating checks stay in ci.yml
# (fmt · clippy · nextest); this job only surfaces a mutation report and is
# intentionally NOT a required status check — do not add it to branch protection.
on:
  schedule:
    - cron: "0 5 * * 1" # Mondays 05:00 UTC
  workflow_dispatch:
  pull_request:
    types: [labeled]

concurrency:
  group: mutants-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  mutants:
    name: cargo mutants (core)
    # Always on schedule/dispatch; on a PR only when it carries the `mutation`
    # label. Ordinary PR pushes never trigger this job, so it cannot gate them.
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'mutation')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml is the single source of truth for the toolchain
      # (channel + rustfmt/clippy); see ci.yml.
      - name: Install pinned toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-mutants

      # Fast guard (no build): fail loudly if mutation ever escapes the core crate.
      - name: Verify mutants are scoped to core
        run: ./scripts/check-mutants-scope.sh

      # Surviving mutants are a feedback signal, not a build failure: keep the job
      # green so it never masquerades as broken CI, and surface the outcome in the
      # job summary below. .cargo/mutants.toml scopes this to core and runs nextest.
      - name: Run mutation testing (core)
        continue-on-error: true
        run: cargo mutants | tee mutants-run.log

      - name: Publish results to job summary
        if: always()
        run: |
          {
            echo "## cargo-mutants — core crate"
            echo
            echo '```'
            tail -n 5 mutants-run.log 2>/dev/null || echo "no run output captured"
            echo '```'
            if [ -s mutants.out/missed.txt ]; then
              echo "### Surviving mutants (uncaught)"
              echo '```'
              cat mutants.out/missed.txt
              echo '```'
            else
              echo "_No surviving mutants._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
