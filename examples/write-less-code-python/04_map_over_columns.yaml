lesson_name: "Map Over Columns"
language: Python
description: "Normalize multiple DataFrame columns using an explicit for loop"
textbook_reference: "Just Enough Software Engineering - Chapter 8: Write Less Code, Part II"

exercise:
  type: "function_writing"
  prompt: |
    Write `normalize_columns(df, columns)` that normalizes each column to
    [0, 1] via min-max normalization: `(value - min) / (max - min)`. Use an
    explicit `for` loop — NOT a list comprehension.

    The submission is correct if ALL of these are true:
    - The function is named `normalize_columns`
    - It takes a DataFrame and a list of column names as parameters
    - It uses an explicit `for` loop (e.g., `for col in columns:`)
    - It normalizes each column to [0, 1] using (value - min) / (max - min)
    - It returns the modified DataFrame

    The submission is incorrect if ANY of these are true:
    - It uses a list comprehension instead of a for loop
    - It does not normalize correctly
    - It has a syntax error
    - It does not return the DataFrame
  hints: |
    - Tip: min-max normalization maps the minimum to 0.0 and the maximum to 1.0.
    - Note: the function takes a DataFrame and a list of column names as parameters.
    - Remember: the exercise requires an explicit `for` loop — a list comprehension is not acceptable.
  gotchas: |
    - Gotcha: if a column has all identical values, `max - min` is zero and you get a division-by-zero error — guard with an equality check.
    - Common mistake: forgetting to `return df` at the end — the function must return the modified DataFrame, not None.
    - Watch out for using a list comprehension instead of an explicit `for` loop — the exercise requires the latter.
  code_template: |
    import pandas as pd

    def normalize_columns(df, columns):
        # Use an explicit for loop (not a list comprehension)
        ...
  solution: |
    import pandas as pd

    def normalize_columns(df, columns):
        for col in columns:
            col_min = df[col].min()
            col_max = df[col].max()
            if col_max == col_min:
                df[col] = 0.0
            else:
                df[col] = (df[col] - col_min) / (col_max - col_min)
        return df
  example_usage: |
    df = pd.DataFrame({'a': [0, 10], 'b': [0, 5]})
    print(normalize_columns(df, ['a', 'b']))
    #    a    b
    # 0  0.0  0.0
    # 1  1.0  1.0
  success_criteria: |
    - Function is named `normalize_columns`
    - Uses an explicit for loop (not a list comprehension)
    - Normalizes each column to [0, 1] range
    - Returns the modified DataFrame
  llm_evaluation_prompt: |
    You are evaluating student code for a software engineering course.

    Exercise: Write a function called `normalize_columns` that takes a
    pandas DataFrame and a list of column names, and normalizes each
    column to the range [0, 1] using min-max normalization.

    The function MUST use an explicit `for` loop to iterate over the columns.
    A list comprehension is NOT acceptable, even if it produces correct results.

    Min-max normalization formula: normalized = (value - min) / (max - min)

    A submission is correct if ALL of these are true:
    1. The function is named `normalize_columns`
    2. It takes a DataFrame and a list of column names as parameters
    3. It uses an explicit `for` loop (e.g., `for col in columns:`)
    4. It normalizes each column to [0, 1] using (value - min) / (max - min)
    5. It returns the modified DataFrame

    A submission is incorrect if ANY of these are true:
    1. It uses a list comprehension instead of a for loop
    2. It does not normalize correctly
    3. It has a syntax error
    4. It does not return the DataFrame

    Student submitted this code:
    {student_code}

    Evaluate the code and call the respond_with_feedback function with your assessment.
    Set is_correct to true if the code meets all requirements, false otherwise.
    Provide brief, encouraging feedback (2-3 sentences) in feedback_message.

checks:
  - "assert normalize_columns(pd.DataFrame({'a': [0, 10]}), ['a'])['a'].tolist() == [0.0, 1.0]"
  - "assert normalize_columns(pd.DataFrame({'a': [0, 10], 'b': [0, 5]}), ['a', 'b'])['b'].tolist() == [0.0, 1.0]"
  - "assert normalize_columns(pd.DataFrame({'a': [5, 5]}), ['a'])['a'].tolist() == [0.0, 0.0]"

packages:
  - pandas
